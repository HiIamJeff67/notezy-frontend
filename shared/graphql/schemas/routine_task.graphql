type PrivateRoutineTask {
  id: UUID!
  stationId: UUID!
  title: String!
  purpose: RoutineTaskPurpose!
  payload: RawJSON!
  priority: Int32!
  status: RoutineTaskStatus!
  attempts: Int32!
  maxAttempts: Int32!
  scheduledAt: Time!
  actualStartedAt: Time
  actualEndedAt: Time
  updatedAt: Time!
  createdAt: Time!

  # relations
  station: PrivateStation!
  routines: [PrivateRoutine!]!
}

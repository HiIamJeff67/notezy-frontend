fragment FragmentedBasicPrivateStation on PrivateStation {
  id
  permission
  name
  description
  icon
  headerBackgroundURL
  routineCount
  deletedAt
  updatedAt
  createdAt
}

fragment FragmentedPrivateStation on PrivateStation {
  ...FragmentedBasicPrivateStation
}

fragment FragmentedBasicPrivateSearchableStation on PrivateSearchableStation {
  id
  permission
  name
  icon
  headerBackgroundURL
  routineCount
  deletedAt
  updatedAt
  createdAt
}

fragment FragmentedPrivateSearchableStation on PrivateSearchableStation {
  ...FragmentedBasicPrivateSearchableStation
}
